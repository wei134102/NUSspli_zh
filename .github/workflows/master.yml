# 手动编译 NUSspli（GitHub Actions → Run workflow）

name: build

on:
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: 创建 GitHub Release 并上传 zips（需正式版本号）
        type: boolean
        default: false

jobs:
  build-binary:
    name: Build binary
    runs-on: ubuntu-24.04
    env:
      # ScribeMD/docker-cache is unmaintained on Node 20; use plain docker build instead.
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Prepare encrypt key file
        run: |
          if [ -n "${{ secrets.ENC_KEY }}" ]; then
            printf '%s' "${{ secrets.ENC_KEY }}" > encryptKeyWith
          else
            echo "(no ENC_KEY secret)" > encryptKeyWith
          fi

      - name: Pull Docker base images
        run: |
          set -euo pipefail
          images=(
            devkitpro/devkitppc:20250102
            ghcr.io/wiiu-env/libmocha:20240603
            ghcr.io/wiiu-env/librpxloader:20240425
          )
          for img in "${images[@]}"; do
            for attempt in 1 2 3; do
              echo "Pulling ${img} (attempt ${attempt})..."
              docker pull "${img}" && break
              if [ "${attempt}" -eq 3 ]; then
                echo "Failed to pull ${img}" >&2
                exit 1
              fi
              sleep 20
            done
          done

      - name: Build docker image
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "docker build (attempt ${attempt})..."
            docker build --progress=plain . -t builder && exit 0
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            sleep 30
          done

      - name: Build artifacts
        id: build
        run: |
          docker run --rm -v "${PWD}:/project" builder python3 build.py
          VERSION="$(grep '^version=' version.txt | cut -d= -f2)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Built version: ${VERSION}"

      - name: Upload Aroma DEBUG
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-${{ steps.build.outputs.version }}-Aroma-DEBUG
          path: out/Aroma-DEBUG/*
          if-no-files-found: error

      - name: Upload Channel DEBUG
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-${{ steps.build.outputs.version }}-Channel-DEBUG
          path: out/Channel-DEBUG/*
          if-no-files-found: error

      - name: Upload all zips
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-zips-${{ steps.build.outputs.version }}
          path: zips/*.zip
          if-no-files-found: warn

      - name: Publish GitHub Release
        if: inputs.publish_github_release == true
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.build.outputs.version }}
          name: v${{ steps.build.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          artifactErrorsFailBuild: false
          artifactContentType: application/zip
          body: Manual build ${{ steps.build.outputs.version }}
          artifacts: |
            zips/NUSspli-${{ steps.build.outputs.version }}-Aroma.zip
            zips/NUSspli-${{ steps.build.outputs.version }}-Aroma-DEBUG.zip
            zips/NUSspli-${{ steps.build.outputs.version }}-Channel.zip
            zips/NUSspli-${{ steps.build.outputs.version }}-Channel-DEBUG.zip
