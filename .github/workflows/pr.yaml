# 快速手动编译（与 build 相同，保留别名便于 Actions 列表识别）

name: build-quick

on:
  workflow_dispatch:

jobs:
  build-binary:
    name: Quick build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Prepare encrypt key file
        run: touch encryptKeyWith

      - name: Ensure SDL_FontCache sources are regular files
        run: |
          git submodule update --init --recursive SDL_FontCache
          cp -f SDL_FontCache/SDL_FontCache.c src/SDL_FontCache.c
          cp -f SDL_FontCache/SDL_FontCache.h include/SDL_FontCache.h

      - name: Build docker image
        run: docker build . -t builder

      - name: Build artifacts
        id: build
        run: |
          docker run --rm -v "${PWD}:/project" builder python3 build.py
          VERSION="$(grep '^version=' version.txt | cut -d= -f2)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload Aroma DEBUG
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-${{ steps.build.outputs.version }}-Aroma-DEBUG
          path: out/Aroma-DEBUG/*
          if-no-files-found: error

      - name: Upload all zips
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-zips-${{ steps.build.outputs.version }}
          path: zips/*.zip
          if-no-files-found: warn
