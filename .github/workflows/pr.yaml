# 轻量手动编译（跳过 clang-format，仅 DEBUG 产物）
# 适合改完中文语言包后快速验证能否编过。

name: build-quick

on:
  workflow_dispatch:

jobs:
  build-binary:
    name: Quick build (DEBUG only)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Prepare encrypt key file
        run: |
          if [ -n "${{ secrets.ENC_KEY }}" ]; then
            printf '%s' "${{ secrets.ENC_KEY }}" > encryptKeyWith
          else
            touch encryptKeyWith
          fi

      - name: Build docker image
        run: docker build . -t builder

      - name: Build artifacts
        id: build
        run: |
          docker run --rm -v "${PWD}:/project" builder python3 build.py
          VERSION="$(grep '^version=' version.txt | cut -d= -f2)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload Aroma DEBUG (.wuhb)
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-${{ steps.build.outputs.version }}-Aroma-DEBUG
          path: out/Aroma-DEBUG/*
          if-no-files-found: error

      - name: Upload Channel DEBUG
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-${{ steps.build.outputs.version }}-Channel-DEBUG
          path: out/Channel-DEBUG/*
          if-no-files-found: error

      - name: Upload all zips
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-zips-${{ steps.build.outputs.version }}
          path: zips/*.zip
          if-no-files-found: warn
