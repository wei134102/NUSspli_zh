# 快速手动编译（与 build 相同，保留别名便于 Actions 列表识别）

name: build-quick

on:
  workflow_dispatch:

jobs:
  build-binary:
    name: Quick build
    runs-on: ubuntu-24.04
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Prepare encrypt key file
        run: touch encryptKeyWith

      - name: Pull Docker base images
        run: |
          set -euo pipefail
          for img in devkitpro/devkitppc:20250102 \
            ghcr.io/wiiu-env/libmocha:20240603 \
            ghcr.io/wiiu-env/librpxloader:20240425; do
            for attempt in 1 2 3; do
              docker pull "${img}" && break
              [ "${attempt}" -eq 3 ] && exit 1
              sleep 20
            done
          done

      - name: Build docker image
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            docker build --progress=plain . -t builder && exit 0
            [ "${attempt}" -eq 3 ] && exit 1
            sleep 30
          done

      - name: Build artifacts
        id: build
        run: |
          docker run --rm -v "${PWD}:/project" builder python3 build.py
          VERSION="$(grep '^version=' version.txt | cut -d= -f2)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload Aroma DEBUG
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-${{ steps.build.outputs.version }}-Aroma-DEBUG
          path: out/Aroma-DEBUG/*
          if-no-files-found: error

      - name: Upload all zips
        uses: actions/upload-artifact@v4
        with:
          name: NUSspli-zips-${{ steps.build.outputs.version }}
          path: zips/*.zip
          if-no-files-found: warn
